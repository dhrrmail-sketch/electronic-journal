const staticTranslations={kk:{"Викторина Beta":"Викторина Beta","Живая игра с кодом комнаты и рейтингом":"Бөлме коды мен рейтингі бар тікелей ойын","← Журнал":"← Журнал","Подключение SQL":"SQL қосу","Создать викторину":"Викторина құру","Название":"Атауы","Импортировать вопросы из теста":"Тест сұрақтарын импорттау","Не импортировать":"Импорттамау","Предмет":"Пән","Группа":"Топ","Тема занятия":"Сабақ тақырыбы","Дата оценки в журнале":"Журналдағы баға күні","Время на вопрос, секунд":"Сұрақ уақыты, секунд","Учитывать скорость ответа":"Жауап жылдамдығын есептеу","Вопросы":"Сұрақтар","＋ Добавить вопрос":"＋ Сұрақ қосу","Сохранить викторину":"Викторинаны сақтау","Мои викторины":"Менің викториналарым","Код комнаты":"Бөлме коды","Копировать ссылку":"Сілтемені көшіру","Участники":"Қатысушылар","Показать ответ":"Жауапты көрсету","Завершить":"Аяқтау","Перенести в журнал":"Журналға көшіру","Рейтинг":"Рейтинг","Понятный гайд подключения и проведения":"Қосу және өткізу жөніндегі түсінікті нұсқаулық","Запустить":"Бастау","Удалить":"Жою","Пояснение":"Түсіндірме","Баллы":"Балдар"},en:{"Викторина Beta":"Quiz Beta","Живая игра с кодом комнаты и рейтингом":"Live game with a room code and leaderboard","← Журнал":"← Gradebook","Подключение SQL":"SQL setup","Создать викторину":"Create quiz","Название":"Title","Импортировать вопросы из теста":"Import questions from a test","Не импортировать":"Do not import","Предмет":"Subject","Группа":"Group","Тема занятия":"Class topic","Дата оценки в журнале":"Gradebook date","Время на вопрос, секунд":"Seconds per question","Учитывать скорость ответа":"Use response-speed bonus","Вопросы":"Questions","＋ Добавить вопрос":"＋ Add question","Сохранить викторину":"Save quiz","Мои викторины":"My quizzes","Код комнаты":"Room code","Копировать ссылку":"Copy link","Участники":"Players","Показать ответ":"Reveal answer","Завершить":"Finish","Перенести в журнал":"Transfer to gradebook","Рейтинг":"Leaderboard","Понятный гайд подключения и проведения":"Simple setup and hosting guide","Запустить":"Start","Удалить":"Delete","Пояснение":"Explanation","Баллы":"Points"},ar:{"Викторина Beta":"المسابقة التجريبية","Живая игра с кодом комнаты и рейтингом":"لعبة مباشرة برمز غرفة ولوحة ترتيب","← Журнал":"السجل ←","Подключение SQL":"إعداد SQL","Создать викторину":"إنشاء مسابقة","Название":"العنوان","Импортировать вопросы из теста":"استيراد الأسئلة من اختبار","Не импортировать":"دون استيراد","Предмет":"المادة","Группа":"المجموعة","Тема занятия":"موضوع الحصة","Дата оценки в журнале":"تاريخ الدرجة في السجل","Время на вопрос, секунд":"وقت السؤال بالثواني","Учитывать скорость ответа":"احتساب سرعة الإجابة","Вопросы":"الأسئلة","＋ Добавить вопрос":"＋ إضافة سؤال","Сохранить викторину":"حفظ المسابقة","Мои викторины":"مسابقاتي","Код комнаты":"رمز الغرفة","Копировать ссылку":"نسخ الرابط","Участники":"المشاركون","Показать ответ":"إظهار الإجابة","Завершить":"إنهاء","Перенести в журнал":"نقل إلى السجل","Рейтинг":"الترتيب","Понятный гайд подключения и проведения":"دليل مبسط للإعداد والتشغيل","Запустить":"بدء","Удалить":"حذف","Пояснение":"الشرح","Баллы":"النقاط"}};
const guideTranslations={ru:"<ol><li>В том же проекте Supabase откройте SQL Editor и один раз выполните файл <b>supabase-quiz.sql</b>.</li><li>Вернитесь в журнал, убедитесь, что облако подключено и выполнен вход преподавателя.</li><li>Создайте викторину вручную или импортируйте вопросы из теста.</li><li>Выберите предмет, группу и дату оценки, затем сохраните викторину.</li><li>Запустите комнату и отправьте студентам ссылку или шестизначный код.</li><li>Запускайте вопросы по очереди, показывайте ответ и рейтинг.</li><li>Завершите игру и после проверки перенесите результат в журнал.</li></ol><p><b>Для смартфонов:</b> приложение должно быть опубликовано на GitHub Pages. Используется публичный адрес, уже настроенный для тестов.</p>",kk:"<ol><li>Сол Supabase жобасында SQL Editor ашып, <b>supabase-quiz.sql</b> файлын бір рет орындаңыз.</li><li>Журналға оралып, бұлттың қосылғанын және оқытушы кіргенін тексеріңіз.</li><li>Викторинаны қолмен құрыңыз немесе тест сұрақтарын импорттаңыз.</li><li>Пәнді, топты және баға күнін таңдаңыз.</li><li>Бөлмені іске қосып, сілтемені немесе алты таңбалы кодты жіберіңіз.</li><li>Сұрақтарды кезекпен іске қосып, жауап пен рейтингті көрсетіңіз.</li><li>Ойынды аяқтап, нәтижені журналға көшіріңіз.</li></ol><p><b>Смартфон үшін:</b> қолданба GitHub Pages сайтында жариялануы керек.</p>",en:"<ol><li>Open SQL Editor in the same Supabase project and run <b>supabase-quiz.sql</b> once.</li><li>Return to the gradebook and verify cloud sign-in.</li><li>Create a quiz manually or import test questions.</li><li>Select the subject, group, and gradebook date.</li><li>Start a room and share its link or six-digit code.</li><li>Start questions one by one, reveal the answer, and show the leaderboard.</li><li>Finish the game and transfer the checked results to the gradebook.</li></ol><p><b>For phones:</b> publish the application on GitHub Pages.</p>",ar:"<ol><li>افتح SQL Editor في مشروع Supabase نفسه ونفّذ ملف <b>supabase-quiz.sql</b> مرة واحدة.</li><li>ارجع إلى السجل وتأكد من تسجيل الدخول إلى السحابة.</li><li>أنشئ المسابقة يدوياً أو استورد أسئلة اختبار.</li><li>اختر المادة والمجموعة وتاريخ الدرجة.</li><li>شغّل الغرفة وشارك الرابط أو الرمز المكوّن من ستة أرقام.</li><li>شغّل الأسئلة بالتتابع ثم أظهر الإجابة والترتيب.</li><li>أنه اللعبة وانقل النتائج بعد مراجعتها إلى السجل.</li></ol><p><b>للهواتف:</b> يجب نشر التطبيق على GitHub Pages.</p>"};
function localizeStatic(){document.documentElement.dir=currentLang==="ar"?"rtl":"ltr";const map=staticTranslations[currentLang]||{};$("pageTitle").textContent=`⚡ ${map["Викторина Beta"]||"Викторина Beta"}`;$("subtitle").textContent=map["Живая игра с кодом комнаты и рейтингом"]||"Живая игра с кодом комнаты и рейтингом";$("quizGuide").innerHTML=guideTranslations[currentLang]||guideTranslations.ru;document.querySelectorAll("h2,h3,label,button,a,summary,option").forEach(el=>{if(el.childElementCount)return;const key=el.dataset.ru||el.textContent.trim();if(!el.dataset.ru)el.dataset.ru=key;if(map[key])el.textContent=map[key]})}
function addQuestion(q={}){questions.push({text:q.question_text||q.text||"",options:q.options||{A:"",B:"",C:"",D:""},correct:Array.isArray(q.correct_answers)?q.correct_answers:Array.isArray(q.correct)?q.correct:["A"],explanation:q.explanation||"",points:Number(q.points)||1000});renderQuestions()}
function renderQuestions(){$("questionCount").textContent=questions.length;$("questions").innerHTML=questions.map((q,i)=>`<article class="question" data-i="${i}"><div class="question-head"><b>${i+1}. Вопрос</b><button class="btn ghost remove-q" type="button">×</button></div><div class="field"><textarea class="q-text" placeholder="Текст вопроса">${esc(q.text)}</textarea></div><div class="options">${Object.entries(q.options).map(([k,v])=>`<label class="option"><input type="radio" name="correct-${i}" value="${k}" ${q.correct.includes(k)?"checked":""}><b>${k}</b><input type="text" data-key="${k}" value="${esc(v)}"></label>`).join("")}</div><div class="grid" style="margin-top:8px"><div class="field"><label>Пояснение</label><input class="explanation" value="${esc(q.explanation)}"></div><div class="field"><label>Баллы</label><input class="points" type="number" min="1" value="${q.points}"></div></div></article>`).join("");localizeStatic()}
function collect(){document.querySelectorAll(".question").forEach(el=>{const q=questions[Number(el.dataset.i)];q.text=el.querySelector(".q-text").value.trim();q.options=Object.fromEntries([...el.querySelectorAll("[data-key]")].map(x=>[x.dataset.key,x.value.trim()]));q.correct=[el.querySelector('input[type=radio]:checked')?.value||"A"];q.explanation=el.querySelector(".explanation").value.trim();q.points=Number(el.querySelector(".points").value)||1000})}
$("questions").onclick=e=>{const b=e.target.closest(".remove-q");if(b){questions.splice(Number(b.closest(".question").dataset.i),1);renderQuestions()}};$("addQuestion").onclick=()=>addQuestion();
function fillJournal(){const {state,groups}=journalStudents(),subjects=state.subjects||[];$("subject").innerHTML=subjects.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("");$("group").innerHTML=groups.map(g=>`<option value="${g.id}">${esc(g.course||"—")} — ${esc(g.name)}</option>`).join("")}
async function loadTests(){try{const rows=await api("/rest/v1/tests?select=id,title&order=created_at.desc");$("testSource").innerHTML='<option value="">Не импортировать</option>'+rows.map(x=>`<option value="${x.id}">${esc(x.title)}</option>`).join("")}catch{}}
$("testSource").onchange=async e=>{if(!e.target.value)return;const rows=await api(`/rest/v1/test_questions?select=*&test_id=eq.${e.target.value}&order=position`);questions=[];rows.forEach(addQuestion)};
async function saveQuiz(){collect();if(!$("title").value.trim()||!questions.length)return toast("Введите название и вопросы","error");if(questions.some(q=>!q.text||Object.values(q.options).filter(Boolean).length<2))return toast("Проверьте вопросы и варианты","error");const state=journalStudents().state,subject=(state.subjects||[]).find(s=>s.id===$("subject").value),group=(state.groups||[]).find(g=>g.id===$("group").value),payload={owner_id:cloudSession().user.id,title:$("title").value.trim(),subject_id:subject?.id||"",subject_name:subject?.name||"",group_id:group?.id||"",group_name:group?.name||"",course:group?.course||"",lesson_date:$("lessonDate").value||null,topic:$("topic").value.trim(),seconds_per_question:Number($("seconds").value)||20,speed_bonus:$("speedBonus").checked};const [quiz]=await api("/rest/v1/quiz_sets",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify(payload)});await api("/rest/v1/quiz_questions",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify(questions.map((q,i)=>({quiz_id:quiz.id,position:i+1,question_text:q.text,options:q.options,correct_answers:q.correct,explanation:q.explanation,points:q.points})))});toast(T("saved"));await loadQuizzes()}
$("saveQuiz").onclick=()=>saveQuiz().catch(e=>toast(e.message,"error"));
async function loadQuizzes(){quizzes=await api("/rest/v1/quiz_sets?select=*&order=created_at.desc");$("quizList").innerHTML=quizzes.length?quizzes.map(q=>`<div class="person"><span><b>${esc(q.title)}</b><br><small>${esc(q.subject_name||"—")} · ${esc(q.group_name||"—")} · ${q.seconds_per_question} сек.</small></span><span class="actions"><button class="btn primary start-room" data-id="${q.id}">Запустить</button><button class="btn danger delete-quiz" data-id="${q.id}">Удалить</button></span></div>`).join(""):"Викторин пока нет.";localizeStatic()}
function roomCode(){return String(Math.floor(100000+Math.random()*900000))}
function publicQuizUrl(){if(/^https?:$/.test(location.protocol))return new URL("./take-quiz.html",location.href);const testUrl=String(localStorage.getItem("teacher-journal-test-public-url-v1")||"").trim();if(testUrl){const url=new URL(testUrl);url.pathname=url.pathname.replace(/take-test\.html$/,"take-quiz.html");url.search="";return url}return new URL("./take-quiz.html",location.href)}
async function createRoom(id){const payload={quiz_id:id,owner_id:cloudSession().user.id,code:roomCode()};try{[room]=await api("/rest/v1/quiz_rooms",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify(payload)})}catch{payload.code=roomCode();[room]=await api("/rest/v1/quiz_rooms",{method:"POST",headers:{Prefer:"return=representation"},body:JSON.stringify(payload)})}const quiz=quizzes.find(q=>q.id===id),students=journalStudents().students.filter(s=>!quiz.group_id||s.groupId===quiz.group_id);if(students.length)await api("/rest/v1/quiz_players",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify(students.map(s=>({room_id:room.id,student_id:String(s.id),player_name:`${s.lastName} ${s.firstName}`,active:false})))});$("roomPanel").hidden=false;$("roomCode").textContent=room.code;const url=publicQuizUrl(),config=cloudConfig();url.searchParams.set("code",room.code);url.searchParams.set("project",config.url);url.searchParams.set("key",config.key);url.searchParams.set("lang",currentLang);$("joinUrl").textContent=url.href;if(url.protocol==="file:")toast("Для входа со смартфона сначала укажите публичный адрес тестов GitHub Pages.","error");$("roomPanel").scrollIntoView({behavior:"smooth"});toast(T("created"));startRoomMonitor()}
$("quizList").onclick=async e=>{const b=e.target.closest("button");if(!b)return;try{if(b.classList.contains("start-room"))await createRoom(b.dataset.id);if(b.classList.contains("delete-quiz")&&confirm("Удалить викторину?")){await api(`/rest/v1/quiz_sets?id=eq.${b.dataset.id}`,{method:"DELETE"});loadQuizzes()}}catch(err){toast(err.message,"error")}};
async function roomData(){if(!room)return;const [fresh,players,answers,qs]=await Promise.all([api(`/rest/v1/quiz_rooms?select=*&id=eq.${room.id}`),api(`/rest/v1/quiz_players?select=*&room_id=eq.${room.id}&active=eq.true&order=joined_at`),api(`/rest/v1/quiz_answers?select=*&room_id=eq.${room.id}`),api(`/rest/v1/quiz_questions?select=*&quiz_id=eq.${room.quiz_id}&order=position`)]);room=fresh[0];const q=qs.find(x=>x.position===room.current_position),answered=q?answers.filter(a=>a.question_id===q.id).length:0;$("playerCount").textContent=players.length;$("players").innerHTML=players.map(x=>`<div class="person"><span>${esc(x.player_name)}</span><button class="btn ghost kick" data-id="${x.id}">×</button></div>`).join("");$("answerProgress").textContent=`${T("answers")}: ${answered} / ${players.length}`;$("liveQuestion").textContent=q?.question_text||"—";$("roomStatus").textContent=T(room.status==="lobby"?"waiting":room.status);$("nextQuestion").textContent=room.current_position?T("next"):T("first");const scores=players.map(p=>({name:p.player_name,points:answers.filter(a=>a.player_id===p.id).reduce((s,a)=>s+a.awarded_points,0)})).sort((a,b)=>b.points-a.points);$("leaderboard").innerHTML=scores.map((x,i)=>`<div class="person"><b>${i+1}. ${esc(x.name)}</b><span>${x.points}</span></div>`).join("");if(room.status==="question"&&room.question_ends_at){const left=Math.max(0,Math.ceil((new Date(room.question_ends_at)-Date.now())/1000));$("liveTimer").textContent=left;if(!left)await reveal()}else $("liveTimer").textContent="—"}
function startRoomMonitor(){clearInterval(roomTimer);roomData();roomTimer=setInterval(()=>roomData().catch(e=>console.error(e)),1000)}
async function next(){const qs=await api(`/rest/v1/quiz_questions?select=position&quiz_id=eq.${room.quiz_id}&order=position`),next=room.current_position+1;if(next>qs.length)return finish();const quiz=quizzes.find(q=>q.id===room.quiz_id),now=new Date(),end=new Date(now.getTime()+(quiz?.seconds_per_question||20)*1000);await api(`/rest/v1/quiz_rooms?id=eq.${room.id}`,{method:"PATCH",body:JSON.stringify({status:"question",current_position:next,question_started_at:now.toISOString(),question_ends_at:end.toISOString()})})}
async function reveal(){if(!room||room.status!=="question")return;await api(`/rest/v1/quiz_rooms?id=eq.${room.id}`,{method:"PATCH",body:JSON.stringify({status:"reveal"})})}
async function finish(){await api(`/rest/v1/quiz_rooms?id=eq.${room.id}`,{method:"PATCH",body:JSON.stringify({status:"finished",finished_at:new Date().toISOString()})});clearInterval(roomTimer);roomData()}
$("copyJoinUrl").onclick=async()=>{try{await navigator.clipboard.writeText($("joinUrl").textContent);toast("Ссылка скопирована")}catch{toast("Не удалось скопировать ссылку","error")}};
async function transferScores(){if(!room)return;if(room.status!=="finished"&&!confirm("Викторина ещё не завершена. Всё равно перенести текущие результаты?"))return;const quiz=quizzes.find(q=>q.id===room.quiz_id),[players,answers,qs]=await Promise.all([api(`/rest/v1/quiz_players?select=*&room_id=eq.${room.id}&active=eq.true`),api(`/rest/v1/quiz_answers?select=*&room_id=eq.${room.id}`),api(`/rest/v1/quiz_questions?select=points&quiz_id=eq.${room.quiz_id}`)]),maximum=qs.reduce((s,q)=>s+Number(q.points||0),0);if(!maximum)return toast("Нет баллов для переноса","error");const state=journalStudents().state,subject=(state.subjects||[]).find(s=>s.id===quiz.subject_id);if(!subject)return toast("Предмет не найден в журнале","error");subject.criteria||=[];let criterion=subject.criteria.find(c=>c.id==="quiz");if(!criterion){criterion={id:"quiz",name:"Онлайн-викторина",max:100};subject.criteria.push(criterion)}const date=quiz.lesson_date||new Date().toISOString().slice(0,10);subject.grades||={};subject.grades[date]||={};let transferred=0;players.forEach(p=>{if(!p.student_id)return;const earned=answers.filter(a=>a.player_id===p.id).reduce((s,a)=>s+Number(a.awarded_points||0),0),score=Math.round(Math.min(100,earned/maximum*100)*10)/10;subject.grades[date][p.student_id]||={attendance:"present",mailStatus:"not_sent",comment:""};subject.grades[date][p.student_id].quiz=score;transferred++});if(state.selectedSubjectId===subject.id){state.criteria=subject.criteria;state.grades=subject.grades}localStorage.setItem("teacher-journal-v2",JSON.stringify(state));localStorage.setItem("teacher-journal-local-updated-v1",new Date().toISOString());toast(`Перенесено в журнал: ${transferred}`)}
$("transferScores").onclick=()=>transferScores().catch(e=>toast(e.message,"error"));
$("nextQuestion").onclick=()=>next().catch(e=>toast(e.message,"error"));$("revealQuestion").onclick=()=>reveal().catch(e=>toast(e.message,"error"));$("finishRoom").onclick=()=>finish().catch(e=>toast(e.message,"error"));$("players").onclick=async e=>{const b=e.target.closest(".kick");if(b)await api(`/rest/v1/quiz_players?id=eq.${b.dataset.id}`,{method:"PATCH",body:JSON.stringify({active:false})})};
$("language").value=currentLang;$("language").onchange=e=>{currentLang=e.target.value;localStorage.setItem(LANG_KEY,currentLang);localizeStatic()};
async function init(){localizeStatic();if(!cloudReady()||!cloudSession()?.user){$("connection").textContent=T("need");return}$("connection").textContent=`${T("connected")} ${cloudSession().user.email||""}`;$("lessonDate").value=new Date().toISOString().slice(0,10);fillJournal();addQuestion();await Promise.all([loadTests(),loadQuizzes()])}
init().catch(e=>{$("connection").textContent=e.message;toast(e.message,"error")});
</script>
</body></html>
