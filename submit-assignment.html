<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Сдать работу</title>
<style>:root{--blue:#3d72f4;--blue2:#edf3ff;--ink:#172235;--muted:#6d788a;--line:#dfe6f0;--paper:#fff;--red:#c84a4a;--green:#178765;--app-font:Inter,system-ui,sans-serif;--app-font-size:16px;--button-radius:12px;--field-radius:10px;--card-radius:18px}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:linear-gradient(145deg,#eaf1ff,#f7f4ff);font:var(--app-font-size)/1.5 var(--app-font)}header{padding:20px;text-align:center;color:#fff;background:#152b4d}header h1{margin:0}main{max-width:720px;margin:20px auto;padding:0 12px}.card{padding:20px;background:var(--paper);border:1px solid var(--line);border-radius:var(--card-radius);box-shadow:0 15px 45px #17223518}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.item{padding:10px;background:#f6f8fc;border-radius:10px}.item small{display:block;color:var(--muted)}.notice{padding:12px;margin:12px 0;background:var(--blue2);border-radius:10px}.warning{color:#873d2b;background:#fff0e8}.success{color:#126b4d;background:#e9f8f2}.field{margin:12px 0}.field label{display:block;margin-bottom:5px;font-weight:800}.field input,.field textarea{width:100%;padding:13px;border:1px solid var(--line);border-radius:var(--field-radius);font:inherit}.field textarea{min-height:95px}.btn{width:100%;padding:14px;border:0;border-radius:var(--button-radius);color:#fff;background:var(--blue);font:800 17px inherit;cursor:pointer}.btn:disabled{opacity:.55;cursor:not-allowed}.versions{margin-top:15px}.version{padding:10px;border-bottom:1px solid var(--line)}.progress{height:9px;overflow:hidden;background:#e5eaf2;border-radius:99px}.progress div{height:100%;width:0;background:var(--blue);transition:.2s}.toast{position:fixed;left:10px;right:10px;bottom:10px;padding:13px;color:#fff;background:#172235;border-radius:10px;opacity:0;transform:translateY(50px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:550px){main{margin:10px auto}.card{padding:15px}.meta{grid-template-columns:1fr}header{padding:15px}}</style></head>
<body><header><h1>📄 Сдать работу</h1><div>Еркін ұстаз</div></header><main><section class="card"><div id="loading">Загружаю задание…</div><div id="content" hidden><div id="student"></div><h2 id="title"></h2><div class="meta" id="meta"></div><div class="notice"><b>Описание</b><div id="description"></div></div><div class="notice"><b>Критерии оценивания</b><div id="rubric"></div></div><div id="currentStatus"></div><form id="submitForm"><div class="field"><label>Файл работы — PDF, DOC или DOCX, до 15 МБ</label><input id="file" type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required></div><div class="field"><label>Комментарий студентa</label><textarea id="comment" placeholder="При необходимости напишите пояснение преподавателю"></textarea></div><div class="progress"><div id="progressBar"></div></div><button class="btn" id="submitBtn">Отправить работу</button></form><div class="versions"><h3>История сдачи</h3><div id="versions"></div></div></div></section></main><div class="toast" id="toast"></div>
<script src="./test-shared.js"></script><script>
const {$,api,toast,cloudConfig,cloudReady}=TestBeta,params=new URLSearchParams(location.search),token=params.get("token")||"",lang=params.get("lang")||"ru";let info=null;
const words={ru:{title:"Сдать работу",loading:"Загружаю задание…",bad:"Ссылка на задание недействительна.",send:"Отправить работу",sending:"Файл загружается…",done:"Работа успешно отправлена.",late:"Сдано после дедлайна",onTime:"Сдано вовремя",none:"Работа ещё не сдавалась",version:"Версия",score:"Балл",comment:"Комментарий преподавателя"},kk:{title:"Жұмысты тапсыру",loading:"Тапсырма жүктелуде…",bad:"Тапсырма сілтемесі жарамсыз.",send:"Жұмысты жіберу",sending:"Файл жүктелуде…",done:"Жұмыс сәтті жіберілді.",late:"Мерзімнен кейін тапсырылды",onTime:"Уақытында тапсырылды",none:"Жұмыс әлі тапсырылмаған",version:"Нұсқа",score:"Балл",comment:"Оқытушы пікірі"},en:{title:"Submit assignment",loading:"Loading assignment…",bad:"The assignment link is invalid.",send:"Submit work",sending:"Uploading file…",done:"Your work was submitted successfully.",late:"Submitted after the deadline",onTime:"Submitted on time",none:"No submission yet",version:"Version",score:"Score",comment:"Teacher feedback"},ar:{title:"تسليم العمل",loading:"جارٍ تحميل التكليف…",bad:"رابط التكليف غير صالح.",send:"إرسال العمل",sending:"جارٍ رفع الملف…",done:"تم إرسال العمل بنجاح.",late:"تم التسليم بعد الموعد",onTime:"تم التسليم في الوقت",none:"لم يُسلّم العمل بعد",version:"الإصدار",score:"الدرجة",comment:"تعليق الأستاذ"}}[lang]||{};document.documentElement.dir=lang==="ar"?"rtl":"ltr";document.querySelector("header h1").textContent=`📄 ${words.title}`;$("loading").textContent=words.loading;$("submitBtn").textContent=words.send;
function render(){if(!info)return;$("loading").hidden=true;$("content").hidden=false;$("student").textContent=info.student_name;$("title").textContent=`${info.assignment_type||""}: ${info.title}`;$("meta").innerHTML=[["Предмет",info.subject_name],["Группа",info.group_name],["Занятие",`${info.lesson_number||"—"}${info.lesson_topic?` — ${info.lesson_topic}`:""}`],["Дедлайн",info.deadline_at?new Date(info.deadline_at).toLocaleString():"—"],["Максимальный балл",info.max_score]].map(x=>`<div class="item"><small>${x[0]}</small><b>${TestBeta.esc(x[1]??"—")}</b></div>`).join("");$("description").textContent=info.description||"—";$("rubric").textContent=info.rubric||"—";const s=info.submission;$("currentStatus").innerHTML=s?`<div class="notice ${s.late?"warning":"success"}"><b>${s.late?words.late:words.onTime}</b><br>${TestBeta.esc(s.file_name)} · ${new Date(s.submitted_at).toLocaleString()}${s.score!=null?`<br>${words.score}: ${s.score} / ${info.max_score}`:""}${s.teacher_comment?`<br>${words.comment}: ${TestBeta.esc(s.teacher_comment)}`:""}</div>`:`<div class="notice">${words.none}</div>`;$("versions").innerHTML=(info.versions||[]).map(v=>`<div class="version"><b>${words.version} ${v.version}: ${TestBeta.esc(v.file_name)}</b><br><small>${new Date(v.submitted_at).toLocaleString()} · ${v.late?words.late:words.onTime}${v.score!=null?` · ${words.score}: ${v.score}`:""}</small>${v.teacher_comment?`<div>${words.comment}: ${TestBeta.esc(v.teacher_comment)}</div>`:""}</div>`).join("")||words.none;$("submitForm").hidden=info.assignment_status!=="published"}
async function load(){if(!token||!cloudReady())throw Error(words.bad);info=await api("/rest/v1/rpc/assignment_info",{method:"POST",body:JSON.stringify({p_token:token})},false);render()}
function safeName(name){return String(name).normalize("NFKD").replace(/[^\w.\-]+/g,"-").replace(/-+/g,"-")}
$("submitForm").onsubmit=async e=>{e.preventDefault();const file=$("file").files[0];if(!file)return;if(file.size>15*1024*1024)return toast("Файл больше 15 МБ","error");if(!/\.(pdf|doc|docx)$/i.test(file.name))return toast("Разрешены PDF, DOC и DOCX","error");$("submitBtn").disabled=true;$("submitBtn").textContent=words.sending;try{const config=cloudConfig(),path=`${token}/${crypto.randomUUID()}-${safeName(file.name)}`,url=`${config.url.replace(/\/$/,"")}/storage/v1/object/assignment-submissions/${path}`,upload=await fetch(url,{method:"POST",headers:{apikey:config.key,Authorization:`Bearer ${config.key}`,"Content-Type":file.type||"application/octet-stream","x-upsert":"false"},body:file});if(!upload.ok)throw Error((await upload.text())||`HTTP ${upload.status}`);$("progressBar").style.width="100%";await api("/rest/v1/rpc/submit_assignment",{method:"POST",body:JSON.stringify({p_token:token,p_storage_path:path,p_file_name:file.name,p_file_type:file.type||"",p_file_size:file.size,p_comment:$("comment").value.trim()})},false);toast(words.done);$("file").value="";$("comment").value="";await load()}catch(err){toast(err.message,"error")}finally{$("submitBtn").disabled=false;$("submitBtn").textContent=words.send}};
load().catch(err=>{$("loading").textContent=err.message||words.bad;toast(err.message,"error")});
</script></body></html>
