<html lang="ru"><head>

<style>:root{--blue:#1f5d4c;--blue2:#ebf1e8;--ink:#2c2317;--muted:#8a7b64;--line:#e7dbc4;--bg:#f3ead9;--paper:#fdf9f1;--green:#1f7a5c;--red:#b14a4a;--gold:#b08d2e;--app-font:"Onest",system-ui,sans-serif;--display-font:"Source Serif 4",Georgia,serif;--app-font-size:16px;--button-radius:13px;--field-radius:11px;--card-radius:18px}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font:var(--app-font-size)/1.45 var(--app-font)}header{padding:18px;text-align:center;color:#fff;background:var(--navy);border-bottom:2px solid var(--gold)}header h1{margin:0;font-family:var(--display-font);font-weight:600}main{max-width:660px;margin:18px auto;padding:0 12px}.card{padding:20px;background:var(--paper);border:1px solid var(--line);border-radius:var(--card-radius);box-shadow:0 15px 40px #26395818}.field{margin:12px 0}.field label{display:block;margin-bottom:5px;font-weight:800}.field input,.field select{width:100%;padding:14px;border:1px solid var(--line);border-radius:var(--field-radius);font:inherit}.btn{width:100%;padding:15px;border:0;border-radius:var(--button-radius);color:#fff;background:var(--blue);font:800 17px inherit;cursor:pointer}.code{text-align:center;font-size:26px;letter-spacing:6px}.status{text-align:center;color:var(--muted)}.timer{text-align:center;font-size:48px;font-weight:950;color:var(--red)}.question{font-size:22px;font-weight:900;text-align:center}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.option{min-height:90px;padding:15px;border:0;border-radius:16px;color:#fff;font-size:17px;font-weight:850;cursor:pointer}.option:nth-child(1){background:#d94b50}.option:nth-child(2){background:#3478d4}.option:nth-child(3){background:#d69b25}.option:nth-child(4){background:#2d9b63}.option.selected{outline:5px solid #172235;transform:scale(.98)}.leaders{margin-top:15px}.person{display:grid;grid-template-columns:minmax(120px,1fr) 1.6fr auto;gap:8px;align-items:center;padding:9px;border-bottom:1px solid var(--line)}.bar{height:11px;overflow:hidden;background:#e6ebf3;border-radius:99px}.fill{height:100%;background:linear-gradient(90deg,var(--blue),#56b5ff);border-radius:inherit}.notice{padding:12px;margin-top:12px;text-align:center;background:var(--blue2);border-radius:12px}.toast{position:fixed;left:10px;right:10px;bottom:10px;padding:13px;color:#fff;background:#172235;border-radius:10px;opacity:0;transform:translateY(50px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:500px){main{margin:10px auto}.card{padding:15px}.options{grid-template-columns:1fr}.option{min-height:65px}.question{font-size:20px}.person{grid-template-columns:1fr auto}.bar{grid-column:1/-1}}
/* === Цветовые гаммы (общий ключ с журналом, по умолчанию Қазақстан) === */
html[data-palette="kz"]:not([data-appearance="dark"]){--bg:#eef7f9!important;--paper:#fbfeff!important;--line:#cfe7ec!important;--ink:#14333a!important;--muted:#5f97a3!important;--navy:#0b7e92!important;--blue:#00afca!important;--blue2:#e0f3f6!important;--green:#0e9bb5!important;--green2:#e3f4f7!important;--gold:#fec50c!important}
html[data-palette="sage"]:not([data-appearance="dark"]){--bg:#f3efe6!important;--paper:#fbf8f1!important;--line:#e6e0d2!important;--ink:#33352b!important;--muted:#8a8675!important;--navy:#4a5e46!important;--blue:#6f8a6a!important;--blue2:#eef1e7!important;--green:#5f7a58!important;--green2:#e8efe2!important;--gold:#c2913f!important}
html[data-palette="mist"]:not([data-appearance="dark"]){--bg:#eef0f4!important;--paper:#fbfbfd!important;--line:#e2e5ed!important;--ink:#2f343d!important;--muted:#828a99!important;--navy:#3d4655!important;--blue:#6b7c98!important;--blue2:#eef0f5!important;--green:#5f7088!important;--green2:#e9ecf3!important;--gold:#b9923f!important}
html[data-palette="rose"]:not([data-appearance="dark"]){--bg:#f5ece5!important;--paper:#fffaf6!important;--line:#eaddd4!important;--ink:#3a2e2a!important;--muted:#9a8478!important;--navy:#6e4d44!important;--blue:#b07f70!important;--blue2:#f6ebe5!important;--green:#9c7163!important;--green2:#f1e4dd!important;--gold:#c08a4a!important}

</style></head>
<body><header><h1>⚡ Онлайн-викторина</h1><div>Еркін ұстаз</div></header><main>
<section class="card" id="joinCard"><div class="field"><label>Код комнаты</label><input class="code" id="code" inputmode="numeric" maxlength="6" placeholder="000000"></div><div class="field"><label>Выберите себя</label><select id="student"></select></div><div class="field"><label>Имя на экране</label><input id="name" placeholder="Ваше имя"></div><button class="btn" id="join">Войти в игру</button></section>
<section class="card" id="gameCard" hidden><div class="status" id="status">Ожидание преподавателя…</div><h2 id="title"></h2><div class="timer" id="timer">—</div><div class="question" id="question"></div><div class="options" id="options"></div><div class="notice" id="notice">Ответьте после запуска вопроса.</div><div class="leaders" id="leaders"></div></section>
</main><div class="toast" id="toast"></div><script src="./test-shared.js"></script><script>
const {$,api,toast,cloudReady}=TestBeta;let token=localStorage.getItem("quiz-player-token")||"",state=null,poll=null,selected=[],lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("teacher-journal-language")||"ru";
const words={ru:{title:"Онлайн-викторина",code:"Код комнаты",choose:"Выберите себя",guest:"Не из списка / гость",name:"Имя на экране",enter:"Войти в игру",wait:"Ожидание преподавателя…",answer:"Выберите ответ",right:"Правильный ответ",finished:"Игра завершена",points:"Ваши баллы",answered:"Ответили",accepted:"Ответ принят",leader:"Рейтинг"},kk:{title:"Онлайн викторина",code:"Бөлме коды",choose:"Өзіңізді таңдаңыз",guest:"Тізімде жоқ / қонақ",name:"Экрандағы аты",enter:"Ойынға кіру",wait:"Оқытушыны күту…",answer:"Жауапты таңдаңыз",right:"Дұрыс жауап",finished:"Ойын аяқталды",points:"Сіздің балыңыз",answered:"Жауап берді",accepted:"Жауап қабылданды",leader:"Рейтинг"},en:{title:"Online quiz",code:"Room code",choose:"Select yourself",guest:"Not listed / guest",name:"Display name",enter:"Join game",wait:"Waiting for the teacher…",answer:"Choose an answer",right:"Correct answer",finished:"Game finished",points:"Your points",answered:"Answered",accepted:"Answer accepted",leader:"Leaderboard"},ar:{title:"المسابقة المباشرة",code:"رمز الغرفة",choose:"اختر اسمك",guest:"ضيف / غير موجود في القائمة",name:"الاسم الظاهر",enter:"دخول اللعبة",wait:"انتظار الأستاذ…",answer:"اختر الإجابة",right:"الإجابة الصحيحة",finished:"انتهت اللعبة",points:"نقاطك",answered:"أجاب",accepted:"تم قبول الإجابة",leader:"الترتيب"}}[lang]||{};document.documentElement.dir=lang==="ar"?"rtl":"ltr";document.querySelector("header h1").textContent=`⚡ ${words.title}`;document.querySelector('label[for="code"]');
const labels=document.querySelectorAll(".field label");labels[0].textContent=words.code;labels[1].textContent=words.choose;labels[2].textContent=words.name;$("join").textContent=words.enter;$("status").textContent=words.wait;
const codeFromUrl=new URLSearchParams(location.search).get("code")||"";$("code").value=codeFromUrl;
async function roster(){const code=$("code").value.trim();if(code.length!==6){$("student").innerHTML='<option value="">—</option>';return}try{const students=await api("/rest/v1/rpc/quiz_roster",{method:"POST",body:JSON.stringify({p_code:code})},false);$("student").innerHTML=`<option value="">${words.guest}</option>`+students.map(s=>`<option value="${s.student_id}" ${s.joined?"disabled":""}>${TestBeta.esc(s.name)}${s.joined?" ✓":""}</option>`).join("");$("student").onchange=()=>{const s=students.find(x=>x.student_id===$("student").value);if(s)$("name").value=s.name}}catch(error){$("student").innerHTML='<option value="">—</option>'}}
async function join(){if(!cloudReady())return toast("Облачное подключение не найдено","error");const code=$("code").value.trim(),name=$("name").value.trim();if(code.length!==6||!name)return toast("Введите код и имя","error");const data=await api("/rest/v1/rpc/quiz_join",{method:"POST",body:JSON.stringify({p_code:code,p_student_id:$("student").value||null,p_name:name,p_reconnect:token||null})},false);token=data.token;localStorage.setItem("quiz-player-token",token);localStorage.setItem("quiz-player-name",name);$("joinCard").hidden=true;$("gameCard").hidden=false;startPoll()}
$("join").onclick=()=>join().catch(e=>toast(e.message,"error"));$("code").addEventListener("input",()=>{if($("code").value.trim().length===6)roster()});
function render(s){state=s;$("title").textContent=s.quiz_title||"";$("status").textContent=s.status==="lobby"?words.wait:s.status==="question"?words.answer:s.status==="reveal"?words.right:s.status==="finished"?words.finished:words.wait;$("notice").textContent=`${words.points}: ${s.my_points||0} · ${words.answered}: ${s.answer_count||0}/${s.player_count||0}`;if(s.status==="question"&&s.question){const left=Math.max(0,Math.ceil((new Date(s.question_ends_at)-Date.now())/1000));$("timer").textContent=left;$("question").textContent=s.question.text;$("options").innerHTML=Object.entries(s.question.options||{}).map(([k,v])=>`<button class="option ${selected.includes(k)?"selected":""}" data-key="${k}" ${s.answered?"disabled":""}>${k}. ${TestBeta.esc(v)}</button>`).join("")}else if((s.status==="reveal"||s.status==="finished")&&s.question){const left=s.status==="reveal"&&s.reveal_ends_at?Math.max(0,Math.ceil((new Date(s.reveal_ends_at)-Date.now())/1000)):0;$("timer").textContent=left?`→ ${left}`:"✓";$("question").textContent=s.question.text;const correct=s.question.correct||[];$("options").innerHTML=Object.entries(s.question.options||{}).map(([k,v])=>`<button class="option" style="${correct.includes(k)?"outline:5px solid #172235;opacity:1":"opacity:.35"}" disabled>${k}. ${TestBeta.esc(v)}</button>`).join("");if(s.question.explanation)$("notice").textContent=s.question.explanation}else{$("timer").textContent="—";$("question").textContent="";$("options").innerHTML=""}if((s.leaders||[]).length){const max=Math.max(1,...s.leaders.map(x=>x.points));$("leaders").innerHTML=`<h3>${words.leader}</h3>`+s.leaders.map(x=>`<div class="person"><b>${x.rank}. ${TestBeta.esc(x.name)}</b><div class="bar"><div class="fill" style="width:${x.points/max*100}%"></div></div><span>${x.points}</span></div>`).join("")}else $("leaders").innerHTML=""}
async function refresh(){const previous=state?.position,s=await api("/rest/v1/rpc/quiz_state",{method:"POST",body:JSON.stringify({p_token:token})},false);if(previous!==s.position)selected=[];render(s)}
function startPoll(){clearInterval(poll);refresh();poll=setInterval(()=>refresh().catch(e=>console.error(e)),1000)}
$("options").onclick=async e=>{const b=e.target.closest(".option");if(!b||state?.answered||state?.status!=="question")return;selected=[b.dataset.key];state={...state,answered:true};render(state);try{await api("/rest/v1/rpc/quiz_answer",{method:"POST",body:JSON.stringify({p_token:token,p_question:state.question.id,p_answers:selected})},false);$("notice").textContent=words.accepted}catch(err){state={...state,answered:false};toast(err.message,"error")}refresh()}
if(codeFromUrl)roster();if(token&&codeFromUrl){$("name").value=localStorage.getItem("quiz-player-name")||""}
</script></body></html>
